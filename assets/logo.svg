<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="lavender" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4C4F5"/>
      <stop offset="50%" stop-color="#BEAFEB"/>
      <stop offset="100%" stop-color="#A894E1"/>
    </linearGradient>
    <linearGradient id="lavenderGlow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A6BB5"/>
      <stop offset="100%" stop-color="#BEAFEB"/>
    </linearGradient>
    <linearGradient id="cyanPcb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A8F0FF"/>
      <stop offset="50%" stop-color="#64D2FF"/>
      <stop offset="100%" stop-color="#3BB5E6"/>
    </linearGradient>
    <linearGradient id="cyanGlow" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#80E4FF"/>
      <stop offset="100%" stop-color="#4090C0"/>
    </linearGradient>
    <linearGradient id="bluePcb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A8D0FF"/>
      <stop offset="50%" stop-color="#64AAFF"/>
      <stop offset="100%" stop-color="#4088E6"/>
    </linearGradient>
    <linearGradient id="aquaPcb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#40E8D4"/>
      <stop offset="50%" stop-color="#00C8B4"/>
      <stop offset="100%" stop-color="#00A898"/>
    </linearGradient>
    <linearGradient id="jadePcb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#40D498"/>
      <stop offset="50%" stop-color="#00B478"/>
      <stop offset="100%" stop-color="#00945A"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#121020"/>
      <stop offset="60%" stop-color="#0D0B1A"/>
      <stop offset="100%" stop-color="#05040A"/>
    </radialGradient>

    <filter id="glowLavender" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feFlood flood-color="#BEAFEB" flood-opacity="0.45"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#64D2FF" flood-opacity="0.35"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowBlue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#64AAFF" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowWhite" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#FFFFFF" flood-opacity="0.25"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Hexagonal grid (PCB style) -->
    <pattern id="pcbGrid" x="0" y="0" width="60" height="103.92" patternUnits="userSpaceOnUse" opacity="0.07">
      <path d="M30 0 L60 17.32 L60 51.96 L30 69.28 L0 51.96 L0 17.32 Z" fill="none" stroke="#BEAFEB" stroke-width="0.8"/>
      <path d="M30 103.92 L60 86.6 L60 51.96 L30 69.28 L0 51.96 L0 86.6 Z" fill="none" stroke="#64D2FF" stroke-width="0.8"/>
    </pattern>

    <!-- Via dot pattern -->
    <pattern id="pcbVias" x="60" y="103.92" width="60" height="103.92" patternUnits="userSpaceOnUse" opacity="0.05">
      <circle cx="30" cy="51.96" r="2.5" fill="#64D2FF"/>
      <circle cx="0" cy="0" r="1.5" fill="#BEAFEB"/>
      <circle cx="60" cy="103.92" r="1.5" fill="#64AAFF"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#pcbGrid)"/>
  <rect width="1024" height="1024" fill="url(#pcbVias)"/>

  <!-- Outer PCB rings -->
  <circle cx="512" cy="420" r="340" fill="none" stroke="#64D2FF" stroke-width="1" opacity="0.1" stroke-dasharray="2 6"/>
  <circle cx="512" cy="420" r="320" fill="none" stroke="#BEAFEB" stroke-width="0.8" opacity="0.07" stroke-dasharray="1 4"/>

  <!-- Orbital circuit traces -->
  <ellipse cx="512" cy="420" rx="290" ry="90" fill="none" stroke="#64AAFF" stroke-width="1.5" opacity="0.12" stroke-dasharray="4 8" transform="rotate(-25 512 420)"/>
  <ellipse cx="512" cy="420" rx="290" ry="90" fill="none" stroke="#BEAFEB" stroke-width="0.8" opacity="0.07" transform="rotate(25 512 420)"/>

  <!-- Corner circuit traces -->
  <polyline points="160,180 180,180 180,220 200,220" fill="none" stroke="#64D2FF" stroke-width="2" opacity="0.45"/>
  <circle cx="160" cy="180" r="3" fill="#64D2FF" opacity="0.65"/>
  <circle cx="200" cy="220" r="2" fill="#BEAFEB" opacity="0.45"/>
  <polyline points="864,180 844,180 844,220 824,220" fill="none" stroke="#BEAFEB" stroke-width="2" opacity="0.4"/>
  <circle cx="864" cy="180" r="3" fill="#BEAFEB" opacity="0.6"/>
  <polyline points="160,660 180,660 180,620 200,620" fill="none" stroke="#64AAFF" stroke-width="2" opacity="0.45"/>
  <circle cx="160" cy="660" r="3" fill="#64AAFF" opacity="0.65"/>
  <polyline points="864,660 844,660 844,620 824,620" fill="none" stroke="#00C8B4" stroke-width="2" opacity="0.45"/>
  <circle cx="864" cy="660" r="3" fill="#00C8B4" opacity="0.65"/>

  <!-- Vertical bus traces -->
  <line x1="230" y1="280" x2="230" y2="560" stroke="#BEAFEB" stroke-width="1.5" opacity="0.12" stroke-dasharray="6 12"/>
  <line x1="260" y1="260" x2="260" y2="580" stroke="#64D2FF" stroke-width="1" opacity="0.08" stroke-dasharray="3 9"/>
  <line x1="764" y1="280" x2="764" y2="560" stroke="#64AAFF" stroke-width="1.5" opacity="0.12" stroke-dasharray="6 12"/>
  <line x1="794" y1="260" x2="794" y2="580" stroke="#00C8B4" stroke-width="1" opacity="0.08" stroke-dasharray="3 9"/>

  <!-- Horizontal bus traces -->
  <line x1="280" y1="230" x2="744" y2="230" stroke="#64D2FF" stroke-width="1" opacity="0.08" stroke-dasharray="4 8"/>
  <line x1="280" y1="610" x2="744" y2="610" stroke="#64AAFF" stroke-width="1" opacity="0.08" stroke-dasharray="4 8"/>

  <!-- ===== MAIN DIAMOND SHIELD ===== -->
  <!-- Outer shield outline -->
  <polygon points="512,180 760,310 760,530 512,660 264,530 264,310"
           fill="none" stroke="url(#cyanPcb)" stroke-width="3" filter="url(#glowCyan)"/>

  <!-- Inner shield border -->
  <polygon points="512,195 745,318 745,522 512,645 279,522 279,318"
           fill="none" stroke="#64AAFF" stroke-width="1.5" opacity="0.45" stroke-dasharray="3 6"/>

  <!-- Shield inner fill -->
  <polygon points="512,210 730,325 730,515 512,630 294,515 294,325"
           fill="#0D0B1A" stroke="#BEAFEB" stroke-width="1" opacity="0.55"/>

  <!-- PCB routing inside shield -->
  <line x1="370" y1="370" x2="654" y2="370" stroke="#64D2FF" stroke-width="1" opacity="0.18"/>
  <line x1="370" y1="470" x2="654" y2="470" stroke="#64AAFF" stroke-width="1" opacity="0.18"/>
  <line x1="370" y1="370" x2="370" y2="470" stroke="#BEAFEB" stroke-width="1" opacity="0.12"/>
  <line x1="654" y1="370" x2="654" y2="470" stroke="#00C8B4" stroke-width="1" opacity="0.12"/>

  <!-- PCB vias inside shield -->
  <circle cx="370" cy="370" r="3" fill="#64D2FF" opacity="0.35"/>
  <circle cx="654" cy="370" r="3" fill="#64AAFF" opacity="0.35"/>
  <circle cx="370" cy="470" r="3" fill="#BEAFEB" opacity="0.35"/>
  <circle cx="654" cy="470" r="3" fill="#00C8B4" opacity="0.35"/>

  <!-- ===== CORE CIRCUIT NODE ===== -->
  <circle cx="512" cy="420" r="95" fill="url(#cyanPcb)" opacity="0.05" filter="url(#glowCyan)"/>
  <circle cx="512" cy="420" r="75" fill="url(#lavender)" opacity="0.04" filter="url(#glowLavender)"/>

  <!-- ===== OX LOGO (PCB STYLE) ===== -->
  <!-- O circuit — outer ring -->
  <circle cx="445" cy="420" r="62" fill="none" stroke="url(#cyanPcb)" stroke-width="10" filter="url(#glowCyan)"/>
  <!-- O inner dashed ring -->
  <circle cx="445" cy="420" r="62" fill="none" stroke="#BEAFEB" stroke-width="1" opacity="0.25" stroke-dasharray="2 4"/>
  <!-- O inner cutout -->
  <circle cx="445" cy="420" r="38" fill="#0D0B1A" stroke="url(#bluePcb)" stroke-width="2.5"/>
  <circle cx="445" cy="420" r="38" fill="none" stroke="#64D2FF" stroke-width="0.8" opacity="0.35" stroke-dasharray="1 3"/>

  <!-- O via nodes -->
  <circle cx="445" cy="358" r="3.5" fill="#64D2FF" filter="url(#glowCyan)"/>
  <circle cx="445" cy="482" r="3.5" fill="#64AAFF" filter="url(#glowBlue)"/>
  <circle cx="383" cy="420" r="3.5" fill="#BEAFEB" filter="url(#glowLavender)"/>

  <!-- O trace lines -->
  <line x1="445" y1="358" x2="445" y2="382" stroke="#64D2FF" stroke-width="1.5" opacity="0.55"/>
  <line x1="445" y1="482" x2="445" y2="458" stroke="#64AAFF" stroke-width="1.5" opacity="0.55"/>
  <line x1="383" y1="420" x2="407" y2="420" stroke="#BEAFEB" stroke-width="1.5" opacity="0.55"/>

  <!-- X circuit — left leg -->
  <line x1="563" y1="368" x2="623" y2="472" stroke="url(#bluePcb)" stroke-width="10" stroke-linecap="round" filter="url(#glowBlue)"/>
  <line x1="563" y1="368" x2="623" y2="472" stroke="#BEAFEB" stroke-width="2" opacity="0.25"/>

  <!-- X circuit — right leg -->
  <line x1="623" y1="368" x2="563" y2="472" stroke="url(#cyanPcb)" stroke-width="10" stroke-linecap="round" filter="url(#glowCyan)"/>
  <line x1="623" y1="368" x2="563" y2="472" stroke="#64AAFF" stroke-width="2" opacity="0.25"/>

  <!-- X center junction -->
  <polygon points="593,408 606,420 593,432 580,420" fill="#BEAFEB" filter="url(#glowLavender)"/>
  <circle cx="593" cy="420" r="5" fill="none" stroke="#64D2FF" stroke-width="1" opacity="0.55"/>

  <!-- X endpoint vias -->
  <circle cx="563" cy="368" r="4" fill="#64AAFF" filter="url(#glowBlue)"/>
  <circle cx="623" cy="472" r="4" fill="#64D2FF" filter="url(#glowCyan)"/>
  <circle cx="623" cy="368" r="4" fill="#64D2FF" filter="url(#glowCyan)"/>
  <circle cx="563" cy="472" r="4" fill="#64AAFF" filter="url(#glowBlue)"/>

  <!-- Traces from X endpoints -->
  <line x1="563" y1="368" x2="550" y2="355" stroke="#64AAFF" stroke-width="1.5" opacity="0.35"/>
  <line x1="623" y1="472" x2="636" y2="485" stroke="#64D2FF" stroke-width="1.5" opacity="0.35"/>
  <line x1="623" y1="368" x2="636" y2="355" stroke="#64D2FF" stroke-width="1.5" opacity="0.35"/>
  <line x1="563" y1="472" x2="550" y2="485" stroke="#64AAFF" stroke-width="1.5" opacity="0.35"/>

  <!-- ===== TEXT SECTION ===== -->
  <g filter="url(#glowCyan)">
    <text x="512" y="745" font-family="'Courier New','Consolas',monospace" font-size="88" font-weight="900" fill="url(#cyanPcb)" text-anchor="middle" letter-spacing="12">OXIDE</text>
  </g>

  <!-- Text underline (PCB traces) -->
  <line x1="310" y1="760" x2="714" y2="760" stroke="url(#cyanPcb)" stroke-width="2" opacity="0.55"/>
  <line x1="310" y1="763" x2="714" y2="763" stroke="#64AAFF" stroke-width="1" opacity="0.25"/>
  <line x1="310" y1="766" x2="714" y2="766" stroke="#BEAFEB" stroke-width="0.5" opacity="0.12"/>

  <!-- Subtitle -->
  <text x="512" y="810" font-family="'Courier New','Consolas',monospace" font-size="18" fill="#64D2FF" text-anchor="middle" letter-spacing="8" opacity="0.8">COMMUNITY EDITION</text>

  <!-- Version badge -->
  <rect x="392" y="838" width="240" height="30" rx="15" fill="none" stroke="#64AAFF" stroke-width="1.5" opacity="0.55"/>
  <rect x="394" y="840" width="236" height="26" rx="13" fill="#BEAFEB" opacity="0.04"/>
  <text x="512" y="858" font-family="'Courier New','Consolas',monospace" font-size="14" fill="#BEAFEB" text-anchor="middle" letter-spacing="5" opacity="0.85">COMMUNITY v8.5.0</text>

  <!-- Bottom scan line -->
  <line x1="200" y1="900" x2="824" y2="900" stroke="#64D2FF" stroke-width="1.5" opacity="0.35"/>
  <line x1="200" y1="905" x2="824" y2="905" stroke="#64AAFF" stroke-width="0.8" opacity="0.18" stroke-dasharray="4 6"/>
  <line x1="200" y1="910" x2="824" y2="910" stroke="#BEAFEB" stroke-width="0.5" opacity="0.08" stroke-dasharray="2 8"/>

  <!-- Corner PCB mounting holes -->
  <circle cx="80" cy="80" r="12" fill="none" stroke="#64D2FF" stroke-width="2" opacity="0.35"/>
  <circle cx="80" cy="80" r="4" fill="#121020" stroke="#BEAFEB" stroke-width="1" opacity="0.45"/>
  <circle cx="944" cy="80" r="12" fill="none" stroke="#BEAFEB" stroke-width="2" opacity="0.35"/>
  <circle cx="944" cy="80" r="4" fill="#121020" stroke="#64AAFF" stroke-width="1" opacity="0.45"/>
  <circle cx="80" cy="944" r="12" fill="none" stroke="#64AAFF" stroke-width="2" opacity="0.35"/>
  <circle cx="80" cy="944" r="4" fill="#121020" stroke="#64D2FF" stroke-width="1" opacity="0.45"/>
  <circle cx="944" cy="944" r="12" fill="none" stroke="#00C8B4" stroke-width="2" opacity="0.35"/>
  <circle cx="944" cy="944" r="4" fill="#121020" stroke="#BEAFEB" stroke-width="1" opacity="0.45"/>

  <!-- PCB test points -->
  <circle cx="512" cy="90" r="5" fill="none" stroke="#64D2FF" stroke-width="1" opacity="0.25"/>
  <circle cx="512" cy="90" r="1.5" fill="#64D2FF" opacity="0.45"/>
  <circle cx="512" cy="934" r="5" fill="none" stroke="#64AAFF" stroke-width="1" opacity="0.25"/>
  <circle cx="512" cy="934" r="1.5" fill="#64AAFF" opacity="0.45"/>

  <!-- Extra trace decorations -->
  <polyline points="280,200 300,200 300,240 320,240" fill="none" stroke="#64D2FF" stroke-width="1.5" opacity="0.25"/>
  <circle cx="280" cy="200" r="2" fill="#64D2FF" opacity="0.45"/>
  <polyline points="744,200 724,200 724,240 704,240" fill="none" stroke="#64AAFF" stroke-width="1.5" opacity="0.25"/>
  <circle cx="744" cy="200" r="2" fill="#64AAFF" opacity="0.45"/>
  <polyline points="280,640 300,640 300,600 320,600" fill="none" stroke="#BEAFEB" stroke-width="1.5" opacity="0.25"/>
  <circle cx="280" cy="640" r="2" fill="#BEAFEB" opacity="0.45"/>
  <polyline points="744,640 724,640 724,600 704,600" fill="none" stroke="#00C8B4" stroke-width="1.5" opacity="0.25"/>
  <circle cx="744" cy="640" r="2" fill="#00C8B4" opacity="0.45"/>

  <!-- Floating particles -->
  <circle cx="120" cy="340" r="1.5" fill="#64D2FF" opacity="0.45"/>
  <circle cx="904" cy="300" r="2" fill="#BEAFEB" opacity="0.35"/>
  <circle cx="150" cy="520" r="1.5" fill="#64AAFF" opacity="0.25"/>
  <circle cx="874" cy="560" r="2" fill="#00C8B4" opacity="0.35"/>
  <circle cx="100" cy="420" r="1" fill="#64D2FF" opacity="0.25"/>
  <circle cx="924" cy="420" r="1.5" fill="#BEAFEB" opacity="0.35"/>

  <!-- Diagonal corner traces (difference from original) -->
  <line x1="52" y1="140" x2="90" y2="140" stroke="#64D2FF" stroke-width="1" opacity="0.2"/>
  <line x1="52" y1="140" x2="52" y2="178" stroke="#64AAFF" stroke-width="1" opacity="0.2"/>
  <line x1="972" y1="140" x2="934" y2="140" stroke="#BEAFEB" stroke-width="1" opacity="0.2"/>
  <line x1="972" y1="140" x2="972" y2="178" stroke="#64D2FF" stroke-width="1" opacity="0.2"/>
</svg>
